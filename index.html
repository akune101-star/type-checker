<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>タイプ相性チェッカー - くまらぼ</title>
<meta name="description" content="モンスターの相性をチェックして、バトルを有利に進めよう！名前検索と複合タイプ計算で弱点が一発でわかる。">
<link rel="icon" type="image/png" href="./images/favicon.png">
<style>
  :root {
    --accent: #7c5cff;
    --accent-soft: #ede9ff;
    --bg: #f7f6fb;
    --card: #ffffff;
    --text: #2a2a3a;
    --text-sub: #8a8aa0;
    --border: #ececf5;
    --shadow: 0 2px 12px rgba(40, 30, 90, 0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: var(--text);
    line-height: 1.5;
    padding: 20px 18px 40px;
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ===== ヘッダー（横長ロゴ画像対応） ===== */
  .header-logo {
    width: 100%; max-width: 480px;
    display: block; margin: 0 auto 8px;
  }
  .subtitle {
    font-size: 13px; color: var(--text-sub);
    text-align: center; margin-bottom: 20px;
  }

  /* ===== カード共通 ===== */
  .card {
    background: var(--card); border-radius: 16px; padding: 18px;
    box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .card-title {
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .card-title .icon {
    width: 22px; height: 22px; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== 検索ボックス ===== */
  .search-wrap { position: relative; }
  .search-box {
    width: 100%; padding: 13px 40px 13px 40px;
    font-size: 15px; color: var(--text);
    border: 2px solid var(--accent-soft);
    border-radius: 12px; background: white;
    transition: border-color 0.15s;
  }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-sub); pointer-events: none;
  }
  .clear-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 24px; height: 24px; border-radius: 50%;
    background: #d0d0dc; color: white; border: none; cursor: pointer;
    display: none; align-items: center; justify-content: center; font-size: 14px;
  }
  .clear-btn.show { display: flex; }

  /* ===== サジェスト ===== */
  .suggestions {
    background: white; border-radius: 12px;
    margin-top: 8px; max-height: 280px; overflow-y: auto;
    border: 1px solid var(--border); display: none;
  }
  .suggestions.show { display: block; }
  .suggest-item {
    padding: 10px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #f5f5fa;
  }
  .suggest-item:last-child { border: none; }
  .suggest-item:active { background: var(--accent-soft); }
  .suggest-no { color: var(--text-sub); font-size: 11px; min-width: 42px; font-weight: 600; }
  .suggest-name { flex: 1; font-weight: 600; font-size: 14px; }
  .suggest-types { display: flex; gap: 4px; }
  .no-result { padding: 16px; color: var(--text-sub); text-align: center; font-size: 13px; }

  .selected-tags { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  /* ===== タイプ選択グリッド ===== */
  .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .type-btn {
    position: relative;
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border: 2px solid transparent;
    border-radius: 12px;
    background: var(--bg);
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
    font-family: inherit;
  }
  .type-btn:active { transform: scale(0.97); }
  .type-btn.selected { border-color: var(--accent); background: white; }
  .type-btn.selected::after {
    content: ''; position: absolute; top: -6px; right: -6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z'/></svg>");
    background-size: 14px; background-repeat: no-repeat; background-position: center;
  }
  .type-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .type-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .type-icon svg { width: 18px; height: 18px; }
  .type-label { font-size: 14px; font-weight: 700; color: var(--text); }

  /* ===== タイプタグ ===== */
  .type-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px 5px 5px;
    border-radius: 999px;
    font-size: 12px; font-weight: 700; color: white;
  }
  .type-tag .type-icon-mini {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .type-tag .type-icon-mini svg { width: 11px; height: 11px; }
  .mini-tag {
    padding: 2px 9px; border-radius: 10px; color: white;
    font-size: 10px; font-weight: 700;
  }

  /* ===== 注意書きバナー ===== */
  .info-banner {
    background: var(--accent-soft); color: #5b46c4;
    padding: 12px 14px; border-radius: 12px;
    font-size: 12px; line-height: 1.6;
    margin-bottom: 16px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .info-banner .info-icon {
    flex-shrink: 0; width: 18px; height: 18px;
    border-radius: 50%; border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }

  /* ===== 結果カード ===== */
  .result-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .result-card {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    background: #f0f0f5;
  }
  .result-card-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .result-card-fallback {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: var(--fallback-bg, #888);
  }
  .result-card-fallback svg { width: 50%; height: 50%; opacity: 0.7; }

  .result-card-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
    padding: 16px 8px 10px;
    text-align: center; color: white;
  }
  .result-card-name {
    font-size: 14px; font-weight: 800;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6); line-height: 1.2;
  }
  .result-card-mult {
    font-size: 20px; font-weight: 900;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    margin-top: 2px; line-height: 1;
  }
  .result-card-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--badge-bg, #fff);
    color: var(--badge-color, #333);
    font-size: 10px; font-weight: 800;
    padding: 4px 8px; border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    letter-spacing: 0.02em;
  }
  .result-card.quad::before {
    content: '🔥';
    position: absolute; top: 6px; left: 6px;
    font-size: 20px;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    z-index: 2;
  }
  .result-card.zero .result-card-image {
    filter: grayscale(0.8) brightness(0.55);
  }
  .result-card.zero::before {
    content: '🚫';
    position: absolute; top: 6px; left: 6px;
    font-size: 20px; z-index: 2;
  }

  .tip-banner {
    background: #fff8e0; color: #8a6e10;
    padding: 10px 14px; border-radius: 10px;
    font-size: 12px; margin-top: 12px;
    display: flex; gap: 8px; align-items: center;
  }
  .tip-banner.shield { background: #e3f0ff; color: #2856a0; }
  .tip-banner.block { background: #efeaf8; color: #4a3a70; }
  .empty-state {
    text-align: center; padding: 24px 16px;
    color: var(--text-sub); font-size: 13px;
  }

  footer.credit {
    text-align: center; font-size: 11px; color: var(--text-sub);
    margin-top: 24px; padding: 12px;
  }
  footer.credit a { color: var(--accent); text-decoration: none; }
</style>
</head>

let selected = [];
let selectedPokemon = null;

function renderTypeGrid() {
  const grid = document.getElementById('typeGrid');
  grid.innerHTML = '';
  Object.entries(types).forEach(([key, t]) => {
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.style.background = t.soft;
    if (selected.includes(key)) btn.classList.add('selected');
    if (selected.length >= 2 && !selected.includes(key)) btn.classList.add('disabled');
    btn.innerHTML = `
      <span class="type-icon" style="background:${t.color}">${typeIcons[key]}</span>
      <span class="type-label">${t.name}</span>
    `;
    btn.onclick = () => {
      selectedPokemon = null;
      document.getElementById('searchBox').value = '';
      document.getElementById('clearBtn').classList.remove('show');
      toggleType(key);
    };
    grid.appendChild(btn);
  });
}

function toggleType(key) {
  if (selected.includes(key)) {
    selected = selected.filter(t => t !== key);
  } else if (selected.length < 2) {
    selected.push(key);
  }
  renderTypeGrid();
  renderSelectedTags();
  renderResults();
}

function renderSelectedTags() {
  const wrap = document.getElementById('selectedTags');
  if (selected.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = selected.map(k =>
    `<span class="type-tag" style="background:${types[k].color}">
       <span class="type-icon-mini">${typeIcons[k]}</span>${types[k].name}
     </span>`
  ).join('');
}

const searchBox = document.getElementById('searchBox');
const suggestions = document.getElementById('suggestions');
const clearBtn = document.getElementById('clearBtn');

searchBox.addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  if (q) clearBtn.classList.add('show'); else clearBtn.classList.remove('show');
  if (!q) { suggestions.classList.remove('show'); return; }

  const hits = pokemons.filter(p => {
    const [no, ja, hira, en] = p;
    return String(no) === q ||
           String(no).padStart(3, '0').includes(q.padStart(3, '0')) ||
           ja.toLowerCase().includes(q) ||
           hira.includes(q) ||
           en.includes(q);
  }).slice(0, 30);

  if (hits.length === 0) {
    suggestions.innerHTML = '<div class="no-result">該当なし</div>';
    suggestions.classList.add('show');
    return;
  }

  suggestions.innerHTML = hits.map(p => {
    const [no, ja, hira, en, t1, t2] = p;
    const tagHtml = [t1, t2].filter(Boolean).map(t =>
      `<span class="mini-tag" style="background:${types[t].color}">${types[t].name}</span>`
    ).join('');
    return `<div class="suggest-item" data-no="${no}">
      <span class="suggest-no">#${String(no).padStart(3, '0')}</span>
      <span class="suggest-name">${ja}</span>
      <span class="suggest-types">${tagHtml}</span>
    </div>`;
  }).join('');
  suggestions.classList.add('show');

  suggestions.querySelectorAll('.suggest-item').forEach(item => {
    item.onclick = () => {
      const no = parseInt(item.dataset.no);
      const p = pokemons.find(x => x[0] === no);
      if (p) selectPokemon(p);
    };
  });
});

clearBtn.onclick = () => {
  searchBox.value = '';
  clearBtn.classList.remove('show');
  suggestions.classList.remove('show');
  selectedPokemon = null;
  selected = [];
  renderTypeGrid();
  renderSelectedTags();
  renderResults();
};

function selectPokemon(p) {
  const [no, ja, hira, en, t1, t2] = p;
  selectedPokemon = p;
  selected = [t1];
  if (t2) selected.push(t2);
  searchBox.value = ja;
  clearBtn.classList.add('show');
  suggestions.classList.remove('show');
  renderTypeGrid();
  renderSelectedTags();
  renderResults();
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap') && !e.target.closest('#suggestions')) {
    suggestions.classList.remove('show');
  }
});

function renderResults() {
  const wrap = document.getElementById('resultsWrap');
  if (selected.length === 0) {
    wrap.innerHTML = `
      <div class="info-banner">
        <span class="info-icon">i</span>
        <span>名前検索またはタイプ選択のどちらかを入力すると、<br>下に効果抜群のタイプが表示されます。</span>
      </div>`;
    return;
  }

  const damage = {};
  Object.keys(types).forEach(attacker => {
    let mult = 1;
    selected.forEach(defender => {
      const v = chart[attacker]?.[defender];
      if (v !== undefined) mult *= v;
    });
    damage[attacker] = mult;
  });

  const groups = { quad: [], double: [], half: [], quarter: [], zero: [] };
  Object.entries(damage).forEach(([k, v]) => {
    if (v === 4) groups.quad.push(k);
    else if (v === 2) groups.double.push(k);
    else if (v === 0.5) groups.half.push(k);
    else if (v === 0.25) groups.quarter.push(k);
    else if (v === 0) groups.zero.push(k);
  });

  let html = '<div class="card">';
  const attackTypes = [...groups.quad, ...groups.double];
  if (attackTypes.length > 0) {
    html += `<div class="card-title"><span class="icon">🎯</span>効果抜群のタイプ</div>`;
    html += '<div class="result-cards">';
    groups.quad.forEach(k => { html += renderResultCard(k, 4); });
    groups.double.forEach(k => { html += renderResultCard(k, 2); });
    html += '</div>';
    html += `<div class="tip-banner">💡 <span>上記のタイプの技は、選択した相手に対して効果抜群です！</span></div>`;
  } else {
    html += `<div class="card-title"><span class="icon">🎯</span>効果抜群のタイプ</div>`;
    html += '<div class="empty-state">効果抜群のタイプはありません</div>';
  }
  html += '</div>';

  if (groups.half.length || groups.quarter.length || groups.zero.length) {
    html += '<div class="card">';
    html += `<div class="card-title"><span class="icon">🛡</span>抵抗・無効のタイプ</div>`;
    html += '<div class="result-cards">';
    groups.quarter.forEach(k => { html += renderResultCard(k, 0.25); });
    groups.half.forEach(k => { html += renderResultCard(k, 0.5); });
    groups.zero.forEach(k => { html += renderResultCard(k, 0); });
    html += '</div>';
    if (groups.zero.length) {
      html += `<div class="tip-banner block">🚫 <span>無効タイプの技は当たりません。打たないよう注意！</span></div>`;
    } else {
      html += `<div class="tip-banner shield">🛡 <span>これらのタイプの技は半減されます。打たない方が無難です。</span></div>`;
    }
    html += '</div>';
  }

  wrap.innerHTML = html;
}

function renderResultCard(typeKey, mult) {
  const t = types[typeKey];
  const multText = mult === 0 ? '×0' : `×${mult}`;

  let badgeText = '', badgeBg = '', badgeColor = '';
  if (mult === 4)         { badgeText = '効果4倍！'; badgeBg = '#fff'; badgeColor = '#d32f2f'; }
  else if (mult === 2)    { badgeText = '効果2倍';   badgeBg = '#fff'; badgeColor = '#f57c00'; }
  else if (mult === 0.5)  { badgeText = '半減';       badgeBg = '#fff'; badgeColor = '#1976d2'; }
  else if (mult === 0.25) { badgeText = '1/4減';     badgeBg = '#fff'; badgeColor = '#0d47a1'; }
  else if (mult === 0)    { badgeText = '無効';       badgeBg = '#222'; badgeColor = '#fff'; }

  const cardClass = mult === 4 ? 'quad' : (mult === 0 ? 'zero' : '');
  const imgSrc = `${IMAGE_PATH}${typeKey}${IMAGE_EXT}`;

  return `<div class="result-card ${cardClass}">
    <img class="result-card-image" src="${imgSrc}" alt="${t.name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="result-card-fallback" style="--fallback-bg:${t.color}">${typeIcons[typeKey]}</div>
    <div class="result-card-badge" style="--badge-bg:${badgeBg};--badge-color:${badgeColor}">${badgeText}</div>
    <div class="result-card-overlay">
      <div class="result-card-name">${t.name}</div>
      <div class="result-card-mult">${multText}</div>
    </div>
  </div>`;
}

renderTypeGrid();
renderSelectedTags();
renderResults();
</script>
